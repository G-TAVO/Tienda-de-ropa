<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tienda Tavo Premium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">🛍️ Tienda Tavo</div>

  <input
    type="text"
    id="buscador"
    placeholder="Buscar productos..."
    onkeyup="buscarProductos()">

  <button onclick="toggleCarrito()">
    🛒 <span id="contador">0</span>
  </button>
</header>

<section class="hero">
  <h1>Nueva Colección 2026</h1>
  <p>Moda, accesorios y mucho más</p>
</section>

<div class="categorias">
  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('ropa')">Ropa</button>
  <button onclick="filtrar('accesorios')">Accesorios</button>
</div>

<section id="productos" class="productos"></section>

<div id="carrito" class="carrito">
  <h2>Carrito</h2>
  <div id="listaCarrito"></div>
  <h3>Total: $<span id="total">0</span></h3>

  <button class="btn-whatsapp" onclick="comprarWhatsapp()">
    Comprar por WhatsApp
  </button>
</div>

<script src="script.js"></script>
</body>
</html>
